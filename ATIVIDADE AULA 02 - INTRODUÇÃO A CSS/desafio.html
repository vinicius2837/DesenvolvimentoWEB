<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Padronização de Estilos</title>

    <style>
        /* ===== TÍTULOS ===== */
        .titulo {
            font-family: Arial, sans-serif;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .titulo-principal {
            font-size: 32px;
            font-weight: bold;
        }

        .titulo-secundario {
            font-size: 24px;
            color: #34495e;
        }

        /* ===== TEXTOS ===== */
        .texto {
            font-family: Verdana, sans-serif;
            font-size: 16px;
            color: #555;
            line-height: 1.6;
        }

        .texto-destaque {
            font-weight: bold;
            color: #e74c3c;
        }

        /* ===== BOTÕES ===== */
        .botao {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .botao-primario {
            background-color: #3498db;
            color: white;
        }

        .botao-primario:hover {
            background-color: #2980b9;
        }

        .botao-secundario {
            background-color: #2ecc71;
            color: white;
        }

        .botao-secundario:hover {
            background-color: #27ae60;
        }

        /* ===== LISTAS ===== */
        .lista {
            font-family: Arial;
            padding: 10px;
        }

        .lista-estilizada {
            list-style-type: square;
            color: #2c3e50;
        }

        .lista-estilizada li {
            margin: 5px 0;
        }

        /* ===== IMAGENS ===== */
        .imagem {
            max-width: 100%;
            border-radius: 10px;
        }

        .imagem-borda {
            border: 3px solid #3498db;
        }

        .imagem-sombra {
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

    </style>
</head>
<body>

    <h1 class="titulo titulo-principal">Pesquisa de Interesse</h1>
    <h2 class="titulo titulo-secundario">Produtos</h2>

    <p class="texto">
        Caso tivesse a possibilidade de adquirir os produtos listados abiaxo, você compraria?. 
        <span class="texto-destaque">Responda apertando em SIM ou NÃO.</span>
    </p>

    <button class="botao botao-primario">SIM</button>
    <button class="botao botao-secundario">NÃO</button>

    <ul class="lista lista-estilizada">
        <li>Iphone 12</li>
        <li>Gol quadrado</li>
        <li>Xbox 360 Bloqueado</li>
    </ul>

    <img src="https://cdn-icons-png.flaticon.com/512/5020/5020323.png"
         class="imagem imagem-borda imagem-sombra"
         alt="Imagem de curiosidade">

</body>
</html>
