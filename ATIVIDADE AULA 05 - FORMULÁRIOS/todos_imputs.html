<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Todos os Inputs</title>
</head>
<body>

    <h1>Exemplo de Inputs</h1>

    <form method="GET">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome"><br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade"><br><br>

        <label for="data">Data:</label>
        <input type="date" id="data" name="data"><br><br>

        <label>Sexo:</label>
        <input type="radio" name="sexo" value="M"> Masculino
        <input type="radio" name="sexo" value="F"> Feminino<br><br>

        <label>Interesses:</label>
        <input type="checkbox" name="interesse" value="html"> HTML
        <input type="checkbox" name="interesse" value="css"> CSS
        <input type="checkbox" name="interesse" value="js"> JavaScript<br><br>

        <label for="cor">Cor favorita:</label>
        <input type="color" id="cor" name="cor"><br><br>

        <label for="arquivo">Enviar arquivo:</label>
        <input type="file" id="arquivo" name="arquivo"><br><br>

        <input type="submit" value="Enviar">

    </form>

</body>
</html>
